services:

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - qdrant
    environment:
      - QDRANT_HOST=qdrant
      - GEMINI_API_KEY=${GOOGLE_API_KEY}

  frontend:
    build: .
    command: streamlit run frontend/app.py --server.port 8501
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  qdrant_data: